library: ~/.local/share/beets/library.db
statefile: ~/.local/share/beets/state.pickle
directory: ~/Library/Mobile Documents/com~apple~CloudDocs/music
plugins: [musicbrainz, chroma, deezer, spotify, lyrics, fetchart, edit]
import:
    write: yes
    move: yes
    copy: no
    quiet_fallback: skip
paths:
    # YouTube downloads are imported as singleton tracks; keep them at Artist/Song.
    singleton: $artist/$title
lyrics:
    # Avoid Google lyrics warnings unless API keys are configured.
    sources: [lrclib, genius]

# Terminal detection: use xterm-kitty inside kitty, otherwise tmux-256color
if-shell '[ -n "$KITTY_WINDOW_ID" ]' \
  'set -g default-terminal "xterm-kitty"' \
  'set -g default-terminal "tmux-256color"'

# Truecolor and italic support (works for both kitty and non-kitty)
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Truecolor for tmux-256color (non-kitty terminals)
set -as terminal-overrides ',tmux-256color:Tc'
set -gq allow-passthrough on

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Extend the history limit
set-option -g history-limit 10000

# Set the base index for windows to 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber tmux windows
set -g renumber-windows on

# Show current command in window name
set -g allow-rename off
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_command}'

# Enable vi mode
setw -g mode-keys vi

# Faster escape sequences (for neovim)
set -sg escape-time 10

# Focus events enabled for terminals that support them
set -g focus-events on

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Essential plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Status bar widgets (CPU/RAM readouts, prefix indicator) used by the theme below
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Tokyo Night theme (matches kitty + neovim), vendored from folke/tokyonight.nvim
source-file ~/.config/tmux/themes/tokyonight_night.tmux

# Window swapping keybindings  
bind-key -r "<" swap-window -d -t -1  # Swap with previous window
bind-key -r ">" swap-window -d -t +1  # Swap with next window

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
